<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopelite</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">Shopelite</a>
      <button class="navbar-toggle" id="navbar-toggle">
        <span></span><span></span><span></span>
      </button>
      <div class="navbar-links" id="navbar-links">
        <a href="index.html" class="active">Home</a>
        <a href="cart.html" class="cart-link">
          Cart <span class="cart-badge hidden" id="cart-badge">0</span>
        </a>
        <a href="register.html">Register</a>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="page-content">
    <div class="container">

      <!-- Search / Filter / Sort -->
      <div class="controls-bar">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="Search products..." autocomplete="off">
        </div>
        <div class="filter-group">
          <select id="category-select">
            <option value="">All Categories</option>
          </select>
          <select id="sort-select">
            <option value="">Sort by</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="name-asc">Name: A to Z</option>
            <option value="name-desc">Name: Z to A</option>
            <option value="rating">Top Rated</option>
          </select>
        </div>
      </div>

      <!-- Loading -->
      <div class="spinner-overlay" id="loading-spinner">
        <div class="spinner"></div>
      </div>

      <!-- Product Grid -->
      <div class="product-grid" id="product-grid"></div>

      <!-- Results Count -->
      <p class="results-count" id="results-count"></p>

      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Shopelite. Built with Fake Store API.</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/pages/home.js"></script>
</body>
</html>
