<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart — Shopelite</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">Shopelite</a>
      <button class="navbar-toggle" id="navbar-toggle">
        <span></span><span></span><span></span>
      </button>
      <div class="navbar-links" id="navbar-links">
        <a href="index.html">Home</a>
        <a href="cart.html" class="cart-link active">
          Cart <span class="cart-badge hidden" id="cart-badge">0</span>
        </a>
        <a href="register.html">Register</a>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="page-content">
    <div class="container">

      <!-- Header -->
      <div class="cart-header">
        <h1 class="page-title">Shopping Cart</h1>
        <span class="cart-count" id="cart-count">(0 items)</span>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="cart-empty" style="display: none;">
        <p>Your cart is empty.</p>
        <a href="index.html" class="btn btn-primary" style="margin-top: 1rem;">Start Shopping</a>
      </div>

      <!-- Cart Layout -->
      <div class="cart-layout" id="cart-layout" style="display: none;">
        <div class="cart-items" id="cart-items"></div>

        <!-- Summary -->
        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="cart-summary-row">
            <span>Subtotal</span>
            <span id="summary-subtotal">$0.00</span>
          </div>
          <div class="cart-summary-row">
            <span>Shipping</span>
            <span id="summary-shipping">$0.00</span>
          </div>
          <div class="cart-summary-row total">
            <span>Total</span>
            <span id="summary-total">$0.00</span>
          </div>
          <button class="btn btn-primary" id="checkout-btn">Proceed to Checkout</button>
          <button class="btn btn-clear" id="clear-cart-btn">Clear Cart</button>
        </div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Shopelite. Built with Fake Store API.</p>
    </div>
  </footer>

  <script src="js/cart.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/pages/cart-page.js"></script>
</body>
</html>
