<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart — DarkStore</title>
  <meta name="description" content="Review your cart items and proceed to checkout.">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/pages/cart.css">
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="main-navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">
        <span class="brand-icon">🛍</span>
        DarkStore
      </a>

      <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="navbar-links" id="navbar-links">
        <a href="index.html">🏠 Home</a>
        <a href="cart.html" class="cart-link active">
          🛒 Cart
          <span class="cart-badge hidden" id="cart-badge">0</span>
        </a>
        <a href="register.html">📝 Register</a>
      </div>
    </div>
  </nav>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="page-content">
    <div class="container">

      <!-- Header -->
      <div class="cart-header">
        <h1 class="page-title">🛒 Shopping Cart</h1>
        <span class="cart-count" id="cart-count">(0 items)</span>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="cart-empty" style="display: none;">
        <div class="empty-icon">🛒</div>
        <p>Your cart is empty.</p>
        <a href="index.html" class="btn btn-primary" style="margin-top: 1rem;">Start Shopping →</a>
      </div>

      <!-- Cart Layout -->
      <div class="cart-layout" id="cart-layout" style="display: none;">
        <!-- Cart Items -->
        <div class="cart-items" id="cart-items"></div>

        <!-- Summary -->
        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="cart-summary-row">
            <span>Subtotal</span>
            <span id="summary-subtotal">$0.00</span>
          </div>
          <div class="cart-summary-row">
            <span>Shipping</span>
            <span id="summary-shipping">$0.00</span>
          </div>
          <div class="cart-summary-row total">
            <span>Total</span>
            <span id="summary-total">$0.00</span>
          </div>
          <button class="btn btn-primary" id="checkout-btn">💳 Proceed to Checkout</button>
          <button class="btn btn-clear" id="clear-cart-btn">🗑 Clear Cart</button>
        </div>
      </div>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="container">
      <p>© 2026 DarkStore. Built with ❤️ using Fake Store API.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/cart.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/pages/cart-page.js"></script>

</body>
</html>
